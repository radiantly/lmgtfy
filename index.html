    <script>
      const searchbox = document.querySelector(".searchinput");
      const searchbtn = document.querySelector(".gsearch");
      const sleep = (time) =>
        new Promise((resolve) => setTimeout(resolve, time));
      const type = async (text) => {
        searchbox.value = "";
        searchbox.focus();
        for (const letter of text) {
          searchbox.value += letter;
          searchbox.selectionStart = searchbox.selectionEnd =
            searchbox.value.length;
          await sleep(125 + Math.floor(Math.random() * 50));
        }
        await sleep(300);
      };
      if (location.hash?.length > 1) {
        const query = atob(location.hash.substring(1));
        type(query).then(() =>
          location.replace(
            "https://goo" + `gle.com/search?q=${encodeURIComponent(query)}`,
          ),
        );
      } else {
        searchbox.addEventListener(
          "input",
          (e) => (location.hash = btoa(e.target.value)),
        );
        searchbox.addEventListener(
          "input",
          (e) => {
            searchbtn.classList.remove("gsearch");
            searchbtn.innerText = "Copy Link";
            searchbtn.addEventListener("click", async (e) => {
              await navigator.clipboard.writeText(location.href);
              const originalText = searchbtn.innerText;
              searchbtn.innerText = "Copied!";
              setTimeout(() => (searchbtn.innerText = originalText), 1000);
            });
          },
          { once: true },
        );
      }
    </script>
